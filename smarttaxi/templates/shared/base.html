<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SmartTaxi{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#F5A623', light: '#FFD080', dark: '#C7840A' },
            dark:    { DEFAULT: '#1A1A2E', card: '#16213E', border: '#0F3460' },
            success: '#10B981',
            danger:  '#EF4444',
            info:    '#3B82F6',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block extra_css %}{% endblock %}
</head>
<body class="bg-dark text-white font-sans min-h-screen">

  {% block navbar %}
  <nav class="bg-dark-card border-b border-dark-border px-6 py-4 flex items-center justify-between">
    <a href="/" class="text-primary font-bold text-xl tracking-wide">🚕 SmartTaxi</a>
    <div class="flex items-center gap-4" id="nav-links">
      <!-- JS tomonidan to'ldiriladi -->
    </div>
  </nav>
  {% endblock %}

  <!-- Toast notification -->
  <div id="toast" class="fixed top-4 right-4 z-50 hidden">
    <div id="toast-body" class="px-5 py-3 rounded-lg text-sm font-medium shadow-lg"></div>
  </div>

  <main class="{% block main_class %}max-w-7xl mx-auto px-4 py-8{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/api/client.js"></script>
  <script src="/static/js/api/auth.js"></script>
  <script src="/static/js/api/drivers.js"></script>
  <script src="/static/js/api/orders.js"></script>
  <script src="/static/js/api/wallet.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
