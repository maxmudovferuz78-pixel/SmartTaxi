<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SmartTaxi{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

{% block body %}
{% block navbar %}{% endblock %}
<main class="{% block main_class %}{% endblock %}">
  {% block content %}{% endblock %}
</main>
{% endblock %}

<script src="/static/js/api/client.js"></script>
<script src="/static/js/api/auth.js"></script>
<script src="/static/js/api/drivers.js"></script>
<script src="/static/js/api/orders.js"></script>
<script src="/static/js/api/wallet.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
